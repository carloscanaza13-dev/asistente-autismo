<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Asistente de Apoyo para Autismo</title>

<style>
body{
font-family: Arial;
background:#f4f8ff;
text-align:center;
padding:40px;
}

h1{
color:#2a6df4;
}

textarea{
width:80%;
height:120px;
font-size:16px;
padding:10px;
}

button{
background:#2a6df4;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
margin-top:10px;
cursor:pointer;
border-radius:8px;
}

#respuesta{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
width:80%;
margin-left:auto;
margin-right:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<h1>Asistente de Apoyo para Autismo</h1>

<p>Realiza una pregunta sobre autismo:</p>

<textarea id="pregunta"></textarea>

<br>

<button onclick="preguntar()">Preguntar</button>

<div id="respuesta"></div>

<script>

const API_KEY = "AIzaSyB1Qh36p5vU8w9MURwL8dilcEPbPQ7_4og";

async function preguntar(){

let pregunta = document.getElementById("pregunta").value;

let respuestaDiv = document.getElementById("respuesta");

respuestaDiv.innerHTML="Pensando...";

let response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{text:pregunta}]
}]
})
});

let data = await response.json();

respuestaDiv.innerHTML = data.candidates[0].content.parts[0].text;

}

</script>

</body>
</html>
